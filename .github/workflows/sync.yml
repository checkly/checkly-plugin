name: Sync skills

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Run sync
        run: npm run sync

      - name: Open pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: sync skills"
          title: "chore: sync skills"
          body: |
            Automated skill sync triggered by `${{ github.event_name }}`.

            Files were pulled per the `source.ref` pinned in `skills.config.ts`. Review the diff before merging.
          branch: sync/skills
          delete-branch: true
          labels: |
            sync
            automated
